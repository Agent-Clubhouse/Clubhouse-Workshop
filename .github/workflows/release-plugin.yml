name: Release Plugin

on:
  push:
    tags:
      - '*-v*'  # e.g., example-hello-world-v0.1.0, code-review-v1.0.0
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g., code-review-v0.1.0)'
        required: true

permissions:
  contents: write
  pull-requests: write

# Serialize registry updates so concurrent releases don't conflict
concurrency:
  group: registry-update
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    # Skip when tags are pushed by the batch workflow (github-actions[bot])
    # to prevent double-trigger. Human-pushed tags still trigger normally.
    if: github.actor != 'github-actions[bot]'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Parse tag
        id: tag
        env:
          INPUT_TAG: ${{ github.event.inputs.tag }}
        run: |
          if [ -n "$INPUT_TAG" ]; then
            TAG="$INPUT_TAG"
            git fetch --tags
            git checkout "$TAG"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          # Extract plugin ID and version from tag like "code-review-v0.1.0" or "my-v2-plugin-v1.2.0-beta.1"
          PLUGIN_ID=$(echo "$TAG" | sed 's/-v[0-9][0-9]*\.[0-9][0-9]*\.[0-9].*//')
          VERSION=$(echo "$TAG" | sed 's/.*-v\([0-9][0-9]*\.[0-9][0-9]*\.[0-9].*\)/\1/')
          # Detect channel: beta tags (version contains -beta.) go to preview registry
          if echo "$VERSION" | grep -q '\-beta\.'; then
            CHANNEL="preview"
          else
            CHANNEL="stable"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "plugin_id=$PLUGIN_ID" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "plugin_dir=plugins/$PLUGIN_ID" >> "$GITHUB_OUTPUT"
          echo "channel=$CHANNEL" >> "$GITHUB_OUTPUT"

      - name: Verify plugin directory exists
        env:
          PLUGIN_DIR: ${{ steps.tag.outputs.plugin_dir }}
        run: |
          if [ ! -d "$PLUGIN_DIR" ]; then
            echo "Error: Plugin directory $PLUGIN_DIR not found"
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build, validate, and zip
        id: release
        env:
          PLUGIN_DIR: ${{ steps.tag.outputs.plugin_dir }}
          PLUGIN_VERSION: ${{ steps.tag.outputs.version }}
        run: |
          node scripts/release-plugin.mjs "$PLUGIN_DIR" "$PLUGIN_VERSION" > /tmp/release-output.json

          cat /tmp/release-output.json

          # Extract fields from JSON output
          ZIP_PATH=$(node -e "const r=JSON.parse(require('fs').readFileSync('/tmp/release-output.json','utf8')); console.log(r.zipPath)")
          SHA256=$(node -e "const r=JSON.parse(require('fs').readFileSync('/tmp/release-output.json','utf8')); console.log(r.sha256)")
          SIZE=$(node -e "const r=JSON.parse(require('fs').readFileSync('/tmp/release-output.json','utf8')); console.log(r.size)")

          echo "zip_path=$ZIP_PATH" >> "$GITHUB_OUTPUT"
          echo "sha256=$SHA256" >> "$GITHUB_OUTPUT"
          echo "size=$SIZE" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "${{ steps.tag.outputs.plugin_id }} v${{ steps.tag.outputs.version }}"
          prerelease: ${{ steps.tag.outputs.channel == 'preview' }}
          body: |
            ## ${{ steps.tag.outputs.plugin_id }} v${{ steps.tag.outputs.version }}

            ### Install
            ```bash
            cp -r plugins/${{ steps.tag.outputs.plugin_id }} ~/.clubhouse/plugins/
            ```

            Or download the zip and extract to `~/.clubhouse/plugins/${{ steps.tag.outputs.plugin_id }}/`.
          files: ${{ steps.release.outputs.zip_path }}

      - name: Update registry and create PR
        env:
          GH_TOKEN: ${{ github.token }}
          PLUGIN_DIR: ${{ steps.tag.outputs.plugin_dir }}
          PLUGIN_ID: ${{ steps.tag.outputs.plugin_id }}
          PLUGIN_VERSION: ${{ steps.tag.outputs.version }}
          RELEASE_TAG: ${{ steps.tag.outputs.tag }}
          RELEASE_SHA256: ${{ steps.release.outputs.sha256 }}
          RELEASE_SIZE: ${{ steps.release.outputs.size }}
          REPO_URL: ${{ github.repository }}
          CHANNEL: ${{ steps.tag.outputs.channel }}
        run: |
          # Save manifest before switching branches (tag checkout may differ from main)
          cp "$PLUGIN_DIR/manifest.json" /tmp/manifest.json

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          BRANCH="registry-update/$RELEASE_TAG"

          git fetch origin main
          git checkout -b "$BRANCH" origin/main

          # Create release metadata JSON for update-registry.mjs
          node -e "
            const fs = require('fs');
            const manifest = JSON.parse(fs.readFileSync('/tmp/manifest.json', 'utf8'));
            const releases = [{
              pluginId: process.env.PLUGIN_ID,
              version: process.env.PLUGIN_VERSION,
              tag: process.env.RELEASE_TAG,
              sha256: process.env.RELEASE_SHA256,
              size: parseInt(process.env.RELEASE_SIZE, 10),
              manifest: manifest
            }];
            fs.writeFileSync('/tmp/registry-releases.json', JSON.stringify(releases, null, 2));
          "

          node scripts/update-registry.mjs /tmp/registry-releases.json \
            --repo "https://github.com/$REPO_URL" \
            --channel "$CHANNEL"

          git add registry/registry.json registry/preview-registry.json
          git diff --cached --quiet && echo "No registry changes" && exit 0

          if [ "$CHANNEL" = "preview" ]; then
            COMMIT_MSG="preview-registry: update $PLUGIN_ID to v$PLUGIN_VERSION"
          else
            COMMIT_MSG="registry: update $PLUGIN_ID to v$PLUGIN_VERSION"
          fi
          git commit -m "$COMMIT_MSG"
          git push --force origin "$BRANCH"

          PR_URL=$(gh pr create \
            --title "$COMMIT_MSG" \
            --body "Automated registry update from release pipeline. Channel: $CHANNEL" \
            --base main \
            --head "$BRANCH")
          echo "Created PR: $PR_URL"
          echo "Registry PR requires human review before merging."
